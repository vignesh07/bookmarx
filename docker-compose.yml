services:
  app:
    image: ghcr.io/vignesh07/bookmarx:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/bookmarx
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookmarx
    volumes:
      - bookmarx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookmarx"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  bookmarx_pgdata:
