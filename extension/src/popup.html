<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bookmarx Sync</title>
    <style>
      :root {
        --paper: #f5f1e8;
        --ink: #1a1a1a;
        --muted: #6b6359;
        --subtle: #8a8270;
        --hairline: #e0d9c8;
        --surface: #ffffff;
      }
      * { box-sizing: border-box; }
      body {
        width: 340px;
        margin: 0;
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--paper);
        color: var(--ink);
      }
      header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--hairline);
      }
      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 6px;
        background: var(--ink);
        color: var(--paper);
        font: 600 16px Georgia, serif;
      }
      h1 {
        margin: 0;
        font: 600 14px -apple-system, BlinkMacSystemFont, sans-serif;
      }
      main { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
      label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
      input {
        padding: 8px 10px;
        border: 1px solid var(--hairline);
        background: var(--surface);
        border-radius: 6px;
        font: 13px ui-monospace, monospace;
        color: var(--ink);
      }
      input:focus { outline: 2px solid #3d6b8a40; outline-offset: -1px; border-color: #3d6b8a; }
      .row { display: flex; gap: 8px; align-items: center; }
      button {
        flex: 1;
        padding: 9px 12px;
        border: 0;
        border-radius: 6px;
        background: var(--ink);
        color: var(--paper);
        font: 600 13px -apple-system, sans-serif;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      button.secondary { background: transparent; color: var(--ink); border: 1px solid var(--hairline); }
      .status {
        padding: 10px 12px;
        background: var(--surface);
        border: 1px solid var(--hairline);
        border-radius: 6px;
        font-size: 12px;
        color: var(--muted);
        white-space: pre-wrap;
        max-height: 120px;
        overflow-y: auto;
      }
      .status.error { color: #b8472a; border-color: #b8472a40; }
      .help { font-size: 11px; color: var(--subtle); line-height: 1.5; }
      .help a { color: var(--muted); }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">b</div>
      <h1>Bookmarx Sync</h1>
    </header>
    <main>
      <button id="syncBtn">Sync now</button>
      <div id="status" class="status">Ready.</div>
      <p class="help">
        Make sure your local Bookmarx server is running on
        <code>http://localhost:3000</code> and you're signed into x.com
        in another tab. Sync pulls every bookmark, then re-uploads any
        changes since the last run.
      </p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
